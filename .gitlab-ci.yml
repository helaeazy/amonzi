stages:
  - quality
  - test
  - build
  - deploy

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

.pnpm-env:
  image: node:24.1.0-alpine3.20
  variables:
    NODE_VERSION: "24.1.0"
    PNPM_VERSION: "10.18.3"
    NPM_CONFIG_PREFIX: "$CI_PROJECT_DIR/.npm-global"
    PNPM_HOME: "$CI_PROJECT_DIR/.pnpm-home"
  before_script:
    - |
      set -euo pipefail
      export PATH="$NPM_CONFIG_PREFIX/bin:$PNPM_HOME:$PATH"
      mkdir -p "$NPM_CONFIG_PREFIX" "$PNPM_HOME"
      export npm_config_prefix="$NPM_CONFIG_PREFIX"
      if command -v pnpm >/dev/null 2>&1 && [ "$(pnpm --version)" = "${PNPM_VERSION}" ]; then
        echo "pnpm@${PNPM_VERSION} already available"
      else
        npm install -g "pnpm@${PNPM_VERSION}"
      fi
      pnpm config set store-dir "$CI_PROJECT_DIR/.pnpm-store"
  cache:
    key: pnpm-${CI_COMMIT_REF_SLUG}
    fallback_keys:
      - pnpm-main
    policy: pull-push
    paths:
      - .pnpm-store

.uv-env:
  image: python:3.12-slim
  variables:
    UV_PROJECT_ENVIRONMENT: "$CI_PROJECT_DIR/.venv"
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates build-essential
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
  cache:
    key: uv-${CI_COMMIT_REF_SLUG}
    fallback_keys:
      - uv-main
    policy: pull-push
    paths:
      - .venv
      - .pip-cache

server-quality:
  stage: quality
  extends:
    - .uv-env
  variables:
    PYTHONPATH: "src/server"
  script:
    - uv sync --frozen --python 3.12
    - uv run ruff check src/server
    - uv run ruff format --check src/server
    - uv run python src/server/manage.py check

client-quality:
  stage: quality
  extends:
    - .pnpm-env
  script:
    - cp src/client/template.env src/client/.env
    - cd src/client
    - pnpm install --frozen-lockfile
    - pnpm run typecheck
    - pnpm run lint

server-test:
  stage: test
  image: python:3.12-slim
  services:
    - postgres:16-alpine
  variables:
    PYTHONPATH: "src/server"
    POSTGRES_HOST_AUTH_METHOD: trust
    # Service container credentials (override project-level vars via before_script export)
    _TEST_POSTGRES_DB: test_amonzi
    _TEST_POSTGRES_USER: test_user
    _TEST_POSTGRES_PASSWORD: test_pass
    _TEST_POSTGRES_HOST: postgres
    _TEST_POSTGRES_PORT: "5432"
    UV_PROJECT_ENVIRONMENT: "$CI_PROJECT_DIR/.venv"
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  cache:
    key: uv-${CI_COMMIT_REF_SLUG}
    fallback_keys:
      - uv-main
    policy: pull-push
    paths:
      - .venv
      - .pip-cache
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates build-essential
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - export POSTGRES_DB="$_TEST_POSTGRES_DB"
    - export POSTGRES_USER="$_TEST_POSTGRES_USER"
    - export POSTGRES_PASSWORD="$_TEST_POSTGRES_PASSWORD"
    - export POSTGRES_HOST="$_TEST_POSTGRES_HOST"
    - export POSTGRES_PORT="$_TEST_POSTGRES_PORT"
  needs:
    - server-quality
  script:
    - uv sync --frozen --python 3.12
    - uv run pytest

client-test:
  stage: test
  extends:
    - .pnpm-env
  needs:
    - client-quality
  script:
    - cp src/client/template.env src/client/.env
    - cd src/client
    - pnpm install --frozen-lockfile
    - pnpm run test -- --run

client-build:
  stage: build
  extends:
    - .pnpm-env
  needs:
    - client-test
  script:
    - cp src/client/template.env src/client/.env
    - cd src/client
    - pnpm install --frozen-lockfile
    - pnpm run build
  artifacts:
    when: always
    paths:
      - src/client/dist/
    expire_in: 7 days

# ── Shared deploy template ──────────────────────────────────────────────────
.deploy-template:
  image: python:3.12-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends openssh-client rsync
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -p 222 www697.your-server.de >> ~/.ssh/known_hosts
  script:
    - |
      ssh -p 222 afp9vy@www697.your-server.de "
        set -e
        cd $DEPLOY_PATH
        git fetch origin
        git checkout $CI_COMMIT_SHA

        # Install/update Python deps
        export PATH=\"\$HOME/.local/bin:\$PATH\"
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync --frozen --python 3.12

        # Run DB migrations
        export POSTGRES_DB=$POSTGRES_DB
        export POSTGRES_USER=$POSTGRES_USER
        export POSTGRES_PASSWORD=$POSTGRES_PASSWORD
        export POSTGRES_HOST=$POSTGRES_HOST
        export POSTGRES_PORT=${POSTGRES_PORT:-5432}
        uv run python src/server/manage.py migrate --noinput

        # Collect static files
        uv run python src/server/manage.py collectstatic --noinput

        # Restart app (adjust to your process manager)
        systemctl restart amonzi-$DEPLOY_ENV 2>/dev/null || \
          pkill -HUP -f 'gunicorn.*amonzi' || true
      "
    - rsync -az -e "ssh -p 222" src/client/dist/ afp9vy@www697.your-server.de:$STATIC_PATH

# ── Dev deploy — auto on dev/develop branch ─────────────────────────────────
deploy-dev:
  stage: deploy
  extends: .deploy-template
  variables:
    DEPLOY_ENV: dev
    DEPLOY_PATH: /usr/local/amonzi-dev
    STATIC_PATH: /usr/local/amonzi-dev/public/
  environment:
    name: dev
    url: https://dev.amonzi.com
  needs:
    - client-build
    - server-test
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      when: on_success

# ── Prod deploy — manual acceptance on main ──────────────────────────────────
deploy-prod:
  stage: deploy
  extends: .deploy-template
  variables:
    DEPLOY_ENV: prod
    DEPLOY_PATH: /usr/local/amonzi
    STATIC_PATH: /usr/local/amonzi/public/
  environment:
    name: production
    url: https://amonzi.com
  needs:
    - client-build
    - server-test
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: false
